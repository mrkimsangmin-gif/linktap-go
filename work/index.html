<!doctype html>
<!--
  [1단계] 홈 화면 아이콘 추가 전용 (리다이렉트 안 함)
  linktap-go 저장소에 work/index.html 로 올린 뒤,
  폰에서 https://mrkimsangmin-gif.github.io/linktap-go/work/ 를 열고
  "홈 화면에 추가" 하세요. (이때 깨끗한 /work/ URL 이 캡처됨)
  아이콘을 만든 뒤 2_redirect_ACTIVE.html 내용으로 교체하면 자동 접속됩니다.
-->
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>회사 터미널</title>
  <style>
    body{font-family:system-ui,sans-serif;background:#111;color:#eee;
         display:flex;min-height:100vh;margin:0;align-items:center;
         justify-content:center;text-align:center;padding:1.5rem}
    .card{max-width:22rem}
    h1{font-size:1.3rem;margin:0 0 .6rem}
    p{color:#aaa;line-height:1.5;font-size:.95rem}
    .k{color:#6cf}
  </style>
</head>
<body>
  <div class="card">
    <h1>회사 터미널</h1>
    <p>이 페이지를 <span class="k">홈 화면에 추가</span> 하세요.<br>
       아이콘을 만든 뒤 관리자가 리다이렉트 버전으로 교체하면,<br>
       다음부터 아이콘 탭 한 번으로 자동 접속됩니다.</p>
  </div>
</body>
</html>
